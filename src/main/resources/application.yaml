spring:
  application:
    name: DondeSiempre
  profiles:
    active: ${SPRING_PROFILE:dev}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
cloudinary:
  url: ${CLOUDINARY_URL:}
  folder-prefix: ${CLOUDINARY_FOLDER_PREFIX:dev}

frontend:
  url: ${FRONTEND_URL}

jwt:
  secret: ${JWT_SECRET:dev-secret-must-be-changed-in-production!!}
  duration: ${JWT_DURATION:2592000}
  # Secure flag on the JWT cookie. Off by default so plain-HTTP dev works.
  # This is set to true in the production profile
  secure-cookie: ${JWT_SECURE_COOKIE:false}
  # SameSite attribute. Lax in dev; overridden to None in the production profile
  # (cross-site requests require None, which must be paired with Secure=true).
  same-site: ${JWT_SAME_SITE:Lax}

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false
