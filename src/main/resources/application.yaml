spring:
  application:
    name: DondeSiempre
  profiles:
    active: ${SPRING_PROFILE:dev}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
cloudinary:
  url: ${CLOUDINARY_URL:}
  folder-prefix: ${CLOUDINARY_FOLDER_PREFIX:dev}

jwt:
  secret: ${JWT_SECRET:dev-secret-must-be-changed-in-production!!}
  duration: ${JWT_DURATION:2592000}

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false
