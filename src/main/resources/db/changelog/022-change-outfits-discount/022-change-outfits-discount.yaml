databaseChangeLog:
  - changeSet:
      id: add-discount-percentage-to-outfits
      author: pepe (adapted by grnln)
      changes:
        - addColumn:
            tableName: outfits
            columns:
              - column:
                  name: discount_percentage
                  type: INT
                  constraints:
                    nullable: true

  - changeSet:
      id: migrate-outfit-discount-values
      author: pepe (adapted by grnln)
      changes:
        - sql:
            sql: |
              WITH prices_in_cents AS (
                SELECT op.outfit_id AS outfit_id, SUM(p.price_in_cents) AS price_in_cents
                  FROM outfit_products AS op INNER JOIN products AS p ON op.product_id = p.id
                  GROUP BY op.outfit_id
              )
              UPDATE outfits AS o
              SET discount_percentage =
                CASE
                  WHEN o.discounted_price_in_cents IS NULL
                    OR o.discounted_price_in_cents = (SELECT p.price_in_cents FROM prices_in_cents AS p WHERE p.outfit_id = o.id)
                    THEN NULL
                  ELSE GREATEST(
                    ROUND(
                      100.0 * ((SELECT p.price_in_cents FROM prices_in_cents AS p WHERE p.outfit_id = o.id) - o.discounted_price_in_cents)
                      / (SELECT p.price_in_cents FROM prices_in_cents AS p WHERE p.outfit_id = o.id)
                    ),
                    1
                  )
                END;

  - changeSet:
      id: drop-outfit-discounted-price
      author: pepe (adapted by grnln)
      changes:
        - dropColumn:
            tableName: outfits
            columnName: discounted_price_in_cents
