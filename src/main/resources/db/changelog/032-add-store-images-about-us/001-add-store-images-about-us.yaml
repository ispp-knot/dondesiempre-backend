databaseChangeLog:
  - changeSet:
      id: 20260411-01-create-store-images-table
      author: estre
      changes:
        - createTable:
            tableName: store_images
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: version
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: display_order
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: image
                  type: VARCHAR(255)
              - column:
                  name: store_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_store_images_store
                    referencedTableName: stores
                    referencedColumnNames: id

  - changeSet:
      id: 20260411-02-unique-store-images-store-display-order
      author: estre
      changes:
        - addUniqueConstraint:
            tableName: store_images
            columnNames: store_id, display_order
            constraintName: uk_store_images_store_display_order

  - changeSet:
      id: 20260411-03-check-store-images-display-order
      author: estre
      changes:
        - sql:
            sql: ALTER TABLE store_images ADD CONSTRAINT chk_store_images_display_order CHECK (display_order >= 0 AND display_order <= 4);
      rollback:
        - sql:
            sql: ALTER TABLE store_images DROP CONSTRAINT chk_store_images_display_order;